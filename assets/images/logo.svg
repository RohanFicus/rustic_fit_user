<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background with subtle texture -->
  <rect width="200" height="200" fill="#1a1a1a"/>
  
  <!-- Golden braided circular border -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#D4AF37" stroke-width="8"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#B8860B" stroke-width="2"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Stylized R with needle design -->
  <g transform="translate(100, 100)">
    <!-- Main R shape -->
    <path d="M -30 -40 L -30 40 L -10 40 L -10 10 L 5 10 L 25 40 L 45 40 L 20 5 Q 35 -5 35 -25 Q 35 -40 20 -40 Z M -10 -20 L 10 -20 Q 20 -20 20 -25 Q 20 -30 10 -30 L -10 -30 Z" 
          fill="#D4AF37" stroke="#B8860B" stroke-width="1"/>
    
    <!-- Thread/needle element -->
    <path d="M -40 -45 Q -30 -35 -20 -25 Q -10 -15 0 -5 Q 10 5 20 15" 
          fill="none" stroke="#FFD700" stroke-width="2"/>
  </g>
  
  <!-- RusticFit text -->
  <text x="100" y="140" font-family="Georgia, serif" font-size="18" font-weight="bold" 
        fill="#D4AF37" text-anchor="middle">RusticFit</text>
  
  <!-- by Kim text -->
  <text x="100" y="160" font-family="Brush Script MT, cursive" font-size="14" 
        fill="#D4AF37" text-anchor="middle" font-style="italic">by Kim</text>
</svg>
